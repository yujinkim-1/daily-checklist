<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <link rel="manifest" href="./manifest.json" />
  <title>Daily Checklist</title>

  <style>
    :root { color-scheme: light dark; }

    :root{
      color-scheme: light;
      --bg1: #f7f4ff;          /* 아주 연한 라벤더 */
      --bg2: #f0fbff;          /* 아주 연한 민트 하늘 */
      --card: rgba(255,255,255,.72);
      --cardBorder: rgba(140,120,220,.20);
      --text: #1f1f2a;
      --muted: rgba(31,31,42,.62);
      --primary: #7c5cff;      /* 포인트 컬러 */
      --primary2: #ff7bbd;     /* 핑크 포인트 */
      --shadow: 0 10px 30px rgba(20, 10, 60, .10);
      --radius: 24px;
    }   
    body{
      margin:0;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;
      background: radial-gradient(1200px 600px at 10% 0%, var(--bg2), transparent 60%),
                  radial-gradient(900px 500px at 90% 20%, #ffe9f3, transparent 55%),
                  linear-gradient(180deg, var(--bg1), #ffffff);
      color: var(--text);
    }
    .wrap { max-width: 560px; margin: 0 auto; padding: 18px 16px 28px; }
    .top { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .date { font-size:14px; opacity:.85; }   
    .title{
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin: 10px 0 14px;
    }
     .card{
      background: var(--card);
      border: 1px solid var(--cardBorder);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .muted{
      color: var(--muted);
      font-size: 13px;
    }
    .progressWrap { display:flex; align-items:center; gap:14px; }
    .ring { width:68px; height:68px; }
    .pct { font-weight:800; font-size:16px; }
    .bar { height:10px; border-radius:999px; background: rgba(255,255,255,.10); overflow:hidden; margin-top:12px; }
    .bar > div{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, var(--primary), var(--primary2));
      transition: width .25s ease;
    }
    ul { list-style:none; padding:0; margin: 14px 0 0; display:flex; flex-direction:column; gap:10px; }
    li{
      display:flex;
      align-items:center;
      gap:12px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.80);
      border: 1px solid rgba(124,92,255,.12);
      box-shadow: 0 6px 18px rgba(20, 10, 60, .06);
    }
    input[type="checkbox"] { width:22px; height:22px; }
    .task { flex:1; font-size:16px; }
    .done { text-decoration: line-through; opacity:.65; }
    .controls { display:flex; gap:10px; margin-top:14px; }
    button { border:0; padding: 12px 14px; border-radius: 14px; background: rgba(255,255,255,.10); color:#fff; font-weight:700; cursor:pointer; }
    button{
      border:0;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(124,92,255,.10);
      color: var(--text);
      font-weight: 800;
      cursor:pointer;
    }
    button.primary{
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      box-shadow: 0 10px 20px rgba(124, 92, 255, .25);
    }
    button:active { transform: translateY(1px); }
    .add { margin-top:14px; display:flex; gap:10px; }
    .add input{
      flex:1;
      padding: 12px 14px;
      border-radius: 16px;
      border:1px solid rgba(124,92,255,.18);
      background: rgba(255,255,255,.85);
      color: var(--text);
    }
    .hint { margin-top: 12px; font-size:12px; opacity:.7; line-height:1.4; }
    a { color:#b9a9ff; }
    /* 카드 안 텍스트 색 통일 (파스텔 테마용) */
    .card,
    .card * {
      color: var(--text) !important;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="date" id="dateText"></div>
      <div class="muted" id="streakText"></div>
    </div>

    <div class="title">Daily Checklist</div>

    <div class="card">
      <div class="row">
        <div class="progressWrap">
          <svg class="ring" viewBox="0 0 100 100" aria-label="progress ring">
    <defs>
      <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#7c5cff"/>
        <stop offset="100%" stop-color="#ff7bbd"/>
      </linearGradient>
    </defs>
            <circle cx="50" cy="50" r="42" stroke="rgba(255,255,255,.10)" stroke-width="10" fill="none"/>
            <circle id="ringFg" cx="50" cy="50" r="42" stroke="url(#grad)" stroke-width="10" fill="none"
                    stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="264"
                    transform="rotate(-90 50 50)"/>
          </svg>
          <div>
            <div class="pct" id="pctText">0%</div>
            <div class="muted" id="countText">0 / 0</div>
          </div>
        </div>
        <div class="muted">오늘</div>
      </div>
      <div class="bar"><div id="barFill"></div></div>

      <ul id="list"></ul>

      <div class="add">
        <input id="newTask" placeholder="할 일 추가 (예: 운동 20분)" maxlength="60" />
        <button class="primary" id="addBtn">추가</button>
      </div>

      <div class="controls">
        <button id="resetTodayBtn">오늘 체크 초기화</button>
        <button id="resetAllBtn">전체 초기화</button>
      </div>

    <!-- Template Editor -->
    <div style="margin-top:16px; padding-top:14px; border-top:1px solid rgba(255,255,255,.10);">
      <div class="row" style="margin-bottom:10px;">
        <div>
          <div style="font-weight:800;">기본 체크 항목(템플릿)</div>
          <div class="muted">내일부터 자동으로 적용돼요</div>
        </div>
        <button id="applyTemplateTodayBtn">템플릿으로 오늘 덮어쓰기</button>
      </div>

      <ul id="tplList"></ul>

      <div class="add">
        <input id="newTplTask" placeholder="예: 🏃 운동 20분" maxlength="60" />
        <button class="primary" id="addTplBtn">추가</button>
      </div>
    </div>

      <div class="hint">
        아이폰 설치: Safari에서 열고 <b>공유</b> → <b>홈 화면에 추가</b>.<br/>
        (참고) iOS는 PWA 푸시알림이 제한될 수 있어. 대신 “미리 알림 앱” 연동도 가능해.
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
